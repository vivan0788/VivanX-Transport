<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | VivanX Transport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002e5d; --orange: #ff6600; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: #333; }
        nav { background: var(--blue); padding: 15px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        h2 { color: var(--blue); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: var(--orange); color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #e65c00; }
        .contact-info { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
</nav>

<div class="container">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/YOUR_UNIQUE_ID" method="POST">
        <input type="text" name="name" placeholder="Aapka Naam" required>
        <input type="email" name="email" placeholder="Aapka Email" required>
        <input type="text" name="phone" placeholder="Mobile Number" required>
        <textarea name="message" rows="5" placeholder="Your questions or Parcel details..." required></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>

<div class="contact-info">
    <p><i class="fas fa-map-marker-alt"></i> VivanX Transport - Courier & Parcel Service</p>
</div>

</body>
</html>
